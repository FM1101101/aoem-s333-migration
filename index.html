<!-- CSS -->
    <link rel="stylesheet" href="style.css">

<div class="main-container">
    <div class="form-wrapper">
        <img
            src="featured-image.png"
            alt="Age of Empires Mobile Empire 333 Migration Illustration"
            class="form-image"
        />
        
        <form action="https://formspree.io/f/xrerrjvb" method="POST">
            <!-- Title and Description -->
            <div class="form-header">
                <h2 class="form-title">AOEM Empire 333 - Migration Application</h2>
                <p class="form-description">
                   Age of Empires Mobile Empire 333 Migration Application
                </p>
                <a class="btn" href="https://discord.gg/qkRu5Mwx" target="_blank" rel="noopener">Join Discord Server</a>
            </div>

            <!-- Basic Attendee Information -->
            <div class="form-group">
                <label for="fullname" class="form-label">Player Name*</label>
                <input
                    type="text"
                    name="player-name"
                    placeholder="e.g. foo"
                    id="player-name"
                    class="form-input"
                    required
                />
            </div>

                        <div class="form-group">
                <label for="fullname" class="form-label">Player ID*</label>
                <input
                    type="number"
                    name="player-id"
                    placeholder="e.g. 5344140737488396215"
                    id="player-id"
                    minlength="19"
                    maxlength="19"
                    class="form-input"
                    required
                />
            </div>

                        <div class="form-group">
                <label for="fullname" class="form-label">Current Server*</label>
                <input
                    type="number"
                    name="current-server"
                    id="current-server"
                    placeholder="e.g. 333"
                    class="form-input"
                    min="288"
                    max="349"
                    required
                />
            </div>

                                    <div class="form-group">
                <label for="fullname" class="form-label">Current Alliance Name*</label>
                <input
                    type="text"
                    name="current-alliance"
                    placeholder="e.g. NTR"
                    id="current-alliance"
                    class="form-input"
                    required
                />
            </div>

                                    <div class="form-group">
                <label for="fullname" class="form-label">Current Power*</label>
                <input
                    type="number"
                    name="current-power"
                    placeholder="e.g. 30000000"
                    id="current-power"
                    min="1"
                    class="form-input"
                    required
                />
            </div>

           <div class="form-group">
                <label for="fullname" class="form-label">Current Merit*</label>
                <input
                    type="number"
                    name="current-merit"
                    placeholder="e.g. 1000000"
                    id="current-merit"
                    min="1"
                    class="form-input"
                    required
                />
            </div>

            <!-- Communication Method -->
            <div class="form-group">
                <label for="ticket-type" class="form-label"
                    >Communication Method*</label
                >
                <select
                    name="communication-method"
                    id="communication-method"
                    class="form-select"
                    required
                >
                    <option value="discord">Discord</option>
                    <option value="whatsapp">WhatsApp</option>
                    <option value="both-dc-wa">Both Discord and WhatsApp</option>
                </select>
            </div>

                       <div class="form-group">
                <label for="fullname" class="form-label">Discord Username*</label>
                <input
                    type="text"
                    name="dc-username"
                    placeholder="e.g. fm1101101"
                    id="dc-username"
                    class="form-input"
                    required
                />
            </div>

                                   <div class="form-group">
                <label for="fullname" class="form-label">WhatsApp Number*</label>
                <input
                    type="text"
                    name="wa-number"
                    placeholder="e.g. 6281234567890 (Country Code + Number)"
                    id="wa-number"
                    class="form-input"
                    required
                />
            </div>

            <!-- Play Time -->
            <div class="form-group">
                <label class="form-label"
                    >Play Time</label
                >
                <div class="radio-group">
                    <label class="checkbox-label">
                        <input
                            type="checkbox"
                            name="play-time"
                            id="01-utc"
                            value="01-utc"
                            class="form-checkbox"
                        />
                        01 UTC
                    </label>
                    <label class="checkbox-label">
                        <input
                            type="checkbox"
                            name="play-time"
                            id="11-utc"
                            value="11-utc"
                            class="form-checkbox"
                        />
                        11 UTC
                    </label>
                        <label class="checkbox-label">
                        <input
                            type="checkbox"
                            name="play-time"
                            id="19-utc"
                            value="19-utc"
                            class="form-checkbox"
                        />
                        19 UTC
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label for="best-main-marches" class="form-label"
                    >Best Main Marches</label
                >
                <select
                    name="best-main-marches"
                    id="best-main-marches"
                    class="form-select"
                >
                    <option value="swordsmen">Swordsmen</option>
                    <option value="cavalry">Cavalry</option>
                    <option value="pikemen">Pikemen</option>
                                        <option value="archers">Archers</option>
                </select>
            </div>
            
                        <div class="form-group">
                <label for="best-main-marches" class="form-label"
                    >Best Second Marches</label
                >
                <select
                    name="best-main-marches"
                    id="best-main-marches"
                    class="form-select"
                >
                    <option value="swordsmen">Swordsmen</option>
                    <option value="cavalry">Cavalry</option>
                    <option value="pikemen">Pikemen</option>
                                        <option value="archers">Archers</option>
                </select>
            </div>

            <div class="form-group">
                <label for="migration-reason" class="form-label"
                    >Why do you want to migrate?</label
                >
                <textarea
                    name="migration-reason"
                    placeholder="Tell us why you want to join our empire"
                    id="migration-reason"
                    rows="3"
                    class="form-textarea"
                ></textarea>
            </div>

            <!-- Consent -->
            <div class="checkbox-group">
                <input
                    type="checkbox"
                    id="consent-checkbox"
                    class="form-checkbox"
                    required
                />
                <label for="consent-checkbox" class="consent-label">
                    I agree to follow all the server rules.
                </label>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="submit-btn">Submit</button>
        </form>
                        <!-- Footer -->
                <footer>
                    <p>Fork <a href="https://github.com/FM1101101/aoem-s333-migration/fork">me</a> | Made with ♥️ by <a
                            href="https://fm1101101.github.io" target="_blank" rel="noopener">foo</a>.</p>
                </footer>
    </div>
</div>
